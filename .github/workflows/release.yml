name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: ubuntu-latest
            goos: linux
            goarch: arm64
          # Windows
          - runner: ubuntu-latest
            goos: windows
            goarch: amd64
          - runner: ubuntu-latest
            goos: windows
            goarch: arm64
          # macOS (per-arch)
          - runner: macos-latest
            goos: darwin
            goarch: arm64
          - runner: macos-latest
            goos: darwin
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: |
          cp lab-guide.md internal/guide/assets/lab-guide.md
          go test ./...

      - name: Build archive
        shell: bash
        run: |
          chmod +x scripts/build-one.sh
          bash scripts/build-one.sh "${{ github.ref_name }}" "${{ matrix.goos }}" "${{ matrix.goarch }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  build-macos-universal:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build universal macOS binary
        run: |
          chmod +x scripts/build-macos-universal.sh
          bash scripts/build-macos-universal.sh "${{ github.ref_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: darwin-universal
          path: dist/*

  release:
    needs: [build, build-macos-universal]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: SHA256 checksums
        run: |
          cd dist
          shasum -a 256 elastic-bangalore_* > SHA256SUMS.txt 2>/dev/null || sha256sum elastic-bangalore_* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          generate_release_notes: true
